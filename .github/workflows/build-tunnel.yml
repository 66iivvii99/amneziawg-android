name: Build AmneziaWG Tunnel

on:
  workflow_dispatch:

jobs:
  build-tunnel:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: |
          yes | sdkmanager --licenses || true
          sdkmanager \
            "platform-tools" \
            "platforms;android-35" \
            "build-tools;35.0.0" \
            "ndk;26.1.10909125" \
            "cmake;3.22.1"

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            clang \
            make \
            cmake \
            ninja-build \
            pkg-config \
            file \
            curl \
            unzip \
            zip

      - name: Prepare Gradle wrapper
        run: |
          chmod +x ./gradlew
          printf "sdk.dir=%s\n" "$ANDROID_HOME" > local.properties
          cat local.properties

      - name: Patch tunnel for RouteBox compatibility
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import re

          stats = Path("tunnel/src/main/java/org/amnezia/awg/backend/Statistics.java")
          text = stats.read_text(encoding="utf-8")

          replacement = """
          public static final class PeerStats {
              private final long rxBytes;
              private final long txBytes;
              private final long latestHandshakeEpochMillis;

              public PeerStats(final long rxBytes, final long txBytes, final long latestHandshakeEpochMillis) {
                  this.rxBytes = rxBytes;
                  this.txBytes = txBytes;
                  this.latestHandshakeEpochMillis = latestHandshakeEpochMillis;
              }

              public long rxBytes() {
                  return rxBytes;
              }

              public long txBytes() {
                  return txBytes;
              }

              public long latestHandshakeEpochMillis() {
                  return latestHandshakeEpochMillis;
              }

              @Override
              public boolean equals(final Object obj) {
                  if (this == obj) return true;
                  if (!(obj instanceof PeerStats)) return false;
                  final PeerStats other = (PeerStats) obj;
                  return rxBytes == other.rxBytes
                      && txBytes == other.txBytes
                      && latestHandshakeEpochMillis == other.latestHandshakeEpochMillis;
              }

              @Override
              public int hashCode() {
                  int result = Long.hashCode(rxBytes);
                  result = 31 * result + Long.hashCode(txBytes);
                  result = 31 * result + Long.hashCode(latestHandshakeEpochMillis);
                  return result;
              }

              @Override
              public String toString() {
                  return "PeerStats[rxBytes=" + rxBytes
                      + ", txBytes=" + txBytes
                      + ", latestHandshakeEpochMillis=" + latestHandshakeEpochMillis + "]";
              }
          }
          """

          text2 = re.sub(
              r"public\s+record\s+PeerStats\s*\(\s*long\s+rxBytes\s*,\s*long\s+txBytes\s*,\s*long\s+latestHandshakeEpochMillis\s*\)\s*\{\s*\}",
              replacement.strip(),
              text,
              count=1,
              flags=re.S,
          )

          if text2 == text:
              raise SystemExit("PeerStats record was not patched")

          stats.write_text(text2, encoding="utf-8")

          gradle = Path("tunnel/build.gradle.kts")
          g = gradle.read_text(encoding="utf-8")
          g = g.replace("sourceCompatibility = JavaVersion.VERSION_17", "sourceCompatibility = JavaVersion.VERSION_11")
          g = g.replace("targetCompatibility = JavaVersion.VERSION_17", "targetCompatibility = JavaVersion.VERSION_11")
          gradle.write_text(g, encoding="utf-8")

          print("Patched Statistics.java and tunnel/build.gradle.kts")
          PY

      - name: Build tunnel release AAR
        run: |
          ./gradlew :tunnel:assembleRelease --stacktrace --no-daemon

      - name: Collect artifacts
        run: |
          mkdir -p artifacts
          find tunnel/build -type f -name "*.aar" -print -exec cp -v {} artifacts/ \;
          find tunnel/build -type f -name "*.so" -print -exec cp -v {} artifacts/ \;
          echo "Collected:"
          find artifacts -type f -maxdepth 1 -print -exec ls -lh {} \;

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: amneziawg-tunnel-artifacts
          path: artifacts/*
